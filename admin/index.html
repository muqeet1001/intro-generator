<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intro Generator — Admin Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, system-ui, sans-serif;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 28px 16px;
      }
      body::before {
        content: ""; position: fixed; inset: 0; z-index: -1;
        background:
          radial-gradient(42rem 42rem at 12% 8%, rgba(237,239,184,.9), transparent 60%),
          radial-gradient(38rem 38rem at 88% 14%, rgba(214,224,255,.7), transparent 60%),
          radial-gradient(46rem 46rem at 78% 96%, rgba(255,231,214,.7), transparent 60%),
          linear-gradient(180deg,#edece7,#e6e5e0);
      }
      .wrap { max-width: 1100px; margin: 0 auto; }
      .glass {
        background: rgba(255,255,255,.32);
        backdrop-filter: blur(22px) saturate(160%);
        -webkit-backdrop-filter: blur(22px) saturate(160%);
        border: 1px solid rgba(255,255,255,.55);
        box-shadow: 0 24px 60px -30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.7);
        border-radius: 28px;
      }
      header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 22px 26px; flex-wrap: wrap; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .mark { width: 34px; height: 34px; display: grid; place-items: center; background: #1a1a1a; color: #fdfdfb; border-radius: 9px; font-family: Poppins; font-weight: 700; }
      h1 { font-family: Poppins; font-size: 20px; font-weight: 600; }
      .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .pill { border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,.65);
        background: rgba(255,255,255,.45); backdrop-filter: blur(10px); transition: transform .12s, background .2s; }
      .pill:hover { background: rgba(255,255,255,.7); transform: translateY(-1px); }
      .pill.dark { background: linear-gradient(180deg,rgba(45,45,45,.92),rgba(20,20,20,.94)); color: #fdfdfb; border-color: rgba(255,255,255,.15); }
      .badge { border-radius: 999px; padding: 4px 12px; font-size: 11px; letter-spacing: .05em; text-transform: uppercase;
        background: rgba(237,239,184,.6); border: 1px solid rgba(255,255,255,.5); }
      .badge.blue { background: rgba(214,224,255,.65); }
      .band { padding: 18px 26px; }
      .band h2 { font-family: Poppins; font-size: 26px; font-weight: 600; }
      .band p { color: rgba(26,26,26,.6); font-size: 14px; margin-top: 2px; }
      .cats { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 26px 14px; }
      .cat { cursor: pointer; border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 500;
        border: 1px solid rgba(255,255,255,.65); background: rgba(255,255,255,.45); backdrop-filter: blur(8px);
        transition: transform .12s, background .2s; }
      .cat:hover { transform: translateY(-1px); }
      .cat.active { background: linear-gradient(180deg,rgba(45,45,45,.92),rgba(20,20,20,.94)); color: #fdfdfb; border-color: rgba(255,255,255,.15); }
      .cat .n { opacity: .55; margin-left: 4px; }
      .search { margin: 0 26px 16px; }
      .search input { width: 100%; border-radius: 16px; padding: 11px 16px; font-size: 14px; border: 1px solid rgba(255,255,255,.6);
        background: rgba(255,255,255,.5); backdrop-filter: blur(10px); outline: none; }
      .search input:focus { border-color: rgba(200,205,120,.9); box-shadow: 0 0 0 4px rgba(237,239,184,.5); }
      .tablewrap { margin: 0 20px 22px; border-radius: 22px; border: 1px solid rgba(255,255,255,.5); overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; background: rgba(255,255,255,.25); min-width: 780px; }
      thead th { text-align: left; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: rgba(26,26,26,.5);
        padding: 14px 18px; background: rgba(255,255,255,.4); }
      tbody td { padding: 14px 18px; border-top: 1px solid rgba(0,0,0,.05); vertical-align: top; }
      tbody tr:hover { background: rgba(255,255,255,.35); }
      .muted { color: rgba(26,26,26,.55); }
      a { color: #1a1a1a; }
      .view { cursor: pointer; border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 500;
        border: 1px solid rgba(0,0,0,.15); background: rgba(255,255,255,.4); }
      .intros { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 8px 0; }
      .intro { border-radius: 14px; padding: 12px; background: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.6); }
      .intro .t { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: rgba(26,26,26,.45); margin-bottom: 4px; }
      .intro p { font-size: 12px; white-space: pre-wrap; color: rgba(26,26,26,.8); }
      .empty, .loading { padding: 40px 26px; color: rgba(26,26,26,.55); font-size: 14px; }
      @media (max-width: 640px) { .intros { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="glass">
        <header>
          <div class="brand">
            <span class="mark">◈</span>
            <h1>Admin — Submissions</h1>
            <span class="badge" id="storage">…</span>
          </div>
          <div class="controls">
            <button class="pill" onclick="load()">Refresh</button>
            <button class="pill" onclick="downloadCsv()">Download CSV</button>
            <button class="pill dark" onclick="downloadJson()">Export JSON</button>
          </div>
        </header>
        <div class="band">
          <h2>Everyone who used the tool</h2>
          <p id="count">Loading…</p>
        </div>
        <div class="cats" id="cats"></div>
        <div class="search">
          <input id="filter" placeholder="Filter by name, email, sector…" oninput="render()" />
        </div>
        <div class="tablewrap">
          <table>
            <thead>
              <tr>
                <th>When</th><th>Name</th><th>Category</th><th>Email</th><th>Role / City</th>
                <th>Sector</th><th>Type</th><th>LinkedIn</th><th></th>
              </tr>
            </thead>
            <tbody id="rows"><tr><td colspan="8" class="loading">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // ── API base ─────────────────────────────────────────────
      // This admin is deployable anywhere. It finds the API in this order:
      //   1. ?api=https://your-api.example.com   (saved to localStorage)
      //   2. previously saved value in localStorage
      //   3. same origin it is served from (e.g. when served by the API itself)
      const qsApi = new URLSearchParams(location.search).get("api");
      if (qsApi) localStorage.setItem("introgen.apiBase", qsApi.replace(/\/$/, ""));
      const API_BASE = localStorage.getItem("introgen.apiBase") || location.origin;
      const API = API_BASE + "/api/admin/leads";

      let LEADS = [];
      let openId = null;
      let activeCat = "";

      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const fmt = (iso) => { try { return new Date(iso).toLocaleString(); } catch { return iso; } };

      async function load() {
        document.getElementById("rows").innerHTML = '<tr><td colspan="8" class="loading">Loading…</td></tr>';
        try {
          const res = await fetch(API);
          const data = await res.json();
          LEADS = data.leads || [];
          document.getElementById("storage").textContent = (data.storage || "") + " store";
          document.getElementById("count").textContent =
            data.count + " total record" + (data.count === 1 ? "" : "s") + " · API: " + API_BASE;
          renderCats();
          render();
        } catch (e) {
          document.getElementById("rows").innerHTML =
            '<tr><td colspan="8" class="empty">Could not reach the API at ' + esc(API_BASE) +
            '. Open this page with ?api=&lt;your-api-url&gt; to point it at the server.</td></tr>';
        }
      }

      function renderCats() {
        const counts = {};
        for (const l of LEADS) {
          const c = l.category || "Other";
          counts[c] = (counts[c] || 0) + 1;
        }
        const cats = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const chip = (label, count, val) =>
          '<span class="cat' + (activeCat === val ? " active" : "") + '" onclick="setCat(\'' + val + '\')">' +
          esc(label) + (count != null ? '<span class="n">' + count + "</span>" : "") + "</span>";
        document.getElementById("cats").innerHTML =
          chip("All", LEADS.length, "") + cats.map(([c, n]) => chip(c, n, c)).join("");
      }

      function setCat(c) { activeCat = c; renderCats(); render(); }

      function render() {
        const q = document.getElementById("filter").value.trim().toLowerCase();
        const rows = LEADS.filter((l) => {
          if (activeCat && (l.category || "Other") !== activeCat) return false;
          if (!q) return true;
          const p = l.payload || {};
          return [l.name, l.email, l.category, p.role, p.city, p.sector].join(" ").toLowerCase().includes(q);
        });
        if (!rows.length) {
          document.getElementById("rows").innerHTML = '<tr><td colspan="9" class="empty">No records' + (q || activeCat ? " match your filter." : " yet.") + "</td></tr>";
          return;
        }
        document.getElementById("rows").innerHTML = rows.map((l) => {
          const p = l.payload || {};
          const li = (l.linkedin || [])[0];
          const isOpen = openId === l.id;
          const intros = l.intros || {};
          const kind = l.kind === "email_requested"
            ? '<span class="badge blue">emailed</span>'
            : '<span class="badge">generated</span>';
          const detail = isOpen
            ? '<tr><td colspan="9"><div class="intros">' +
              ["professional", "friendly", "concise", "storytelling"].map((t) =>
                '<div class="intro"><div class="t">' + t + '</div><p>' + esc(intros[t] || "—") + "</p></div>"
              ).join("") + "</div></td></tr>"
            : "";
          return (
            "<tr>" +
            '<td class="muted" style="white-space:nowrap">' + esc(fmt(l.createdAt)) + "</td>" +
            "<td><strong>" + esc(l.name || "—") + "</strong></td>" +
            '<td><span class="badge">' + esc(l.category || "Other") + "</span></td>" +
            "<td>" + esc(l.email || "—") + "</td>" +
            '<td class="muted">' + esc([p.role, p.city].filter(Boolean).join(" · ") || "—") + "</td>" +
            "<td>" + (p.sector ? '<span class="badge">' + esc(p.sector) + "</span>" : "—") + "</td>" +
            "<td>" + kind + "</td>" +
            "<td>" + (li ? '<a href="' + esc(li) + '" target="_blank">profile</a>' : "—") + "</td>" +
            '<td style="text-align:right"><span class="view" onclick="toggle(\'' + l.id + '\')">' + (isOpen ? "Hide" : "View intros") + "</span></td>" +
            "</tr>" + detail
          );
        }).join("");
      }

      function toggle(id) { openId = openId === id ? null : id; render(); }

      function downloadJson() {
        triggerDownload(new Blob([JSON.stringify(LEADS, null, 2)], { type: "application/json" }), "submissions.json");
      }
      function downloadCsv() {
        const cols = ["createdAt", "kind", "category", "name", "email", "role", "city", "sector", "linkedin"];
        const rows = LEADS.map((l) => {
          const p = l.payload || {};
          return [l.createdAt, l.kind, l.category, l.name, l.email, p.role, p.city, p.sector, (l.linkedin || []).join(" ")]
            .map((v) => '"' + String(v ?? "").replace(/"/g, '""') + '"').join(",");
        });
        triggerDownload(new Blob([cols.join(",") + "\n" + rows.join("\n")], { type: "text/csv" }), "submissions.csv");
      }
      function triggerDownload(blob, name) {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      load();
    </script>
  </body>
</html>
